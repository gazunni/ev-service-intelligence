<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EV Service Intelligence</title>
  <style>
    body { font-family: Arial, sans-serif; margin:20px; background:#f7f8fa; color:#334155; }
    h1 { color:#1e293b; }
    select, button { padding: 0.5em; font-size:1em; margin:0.5em 0; }
    .vehicle-section { border:1px solid #cbd5e1; padding:1em; margin:1em 0; border-radius:5px; background:white; }
    .record { margin:0.5em 0; padding:0.5em; border-bottom:1px solid #e2e8f0; }
    .severity { font-weight:bold; }
  </style>
</head>
<body>
  <h1>EV Service Intelligence</h1>

  <label for="vehicle">Select Vehicle:</label>
  <select id="vehicle">
    <option value="equinox_ev">Chevrolet Equinox EV</option>
    <option value="blazer_ev">Chevrolet Blazer EV</option>
    <option value="mach_e">Ford Mustang Mach-E</option>
  </select>

  <label for="year">Select Year:</label>
  <input type="number" id="year" value="2024" min="2022" max="2030">

  <button id="runSweep">Fetch & Summarize Issues</button>
  <button id="refreshData">Load Stored Data</button>

  <div id="results"></div>

  <script>
    const results = document.getElementById('results');

    async function runSweep() {
      const vehicle = document.getElementById('vehicle').value;
      const year = document.getElementById('year').value;

      results.innerHTML = '<p>Running sweep...</p>';
      const res = await fetch(`/.netlify/functions/run-sweep?vehicle=${vehicle}&year=${year}`);
      const data = await res.json();
      results.innerHTML = '<h2>Sweep Complete</h2>';
      displayRecords([...data.recalls, ...data.knownIssues]);
    }

    async function refreshData() {
      const vehicle = document.getElementById('vehicle').value;
      const year = document.getElementById('year').value;

      results.innerHTML = '<p>Loading stored data...</p>';
      const res = await fetch(`/.netlify/functions/get-data?vehicle=${vehicle}&year=${year}`);
      const data = await res.json();
      results.innerHTML = '<h2>Stored Records</h2>';
      displayRecords([...data.recalls, ...data.pip, ...data.tsb, ...data.community]);
    }

    function displayRecords(records) {
      if(!records.length) { results.innerHTML += '<p>No records found.</p>'; return; }
      results.innerHTML += records.map(r => `
        <div class="record">
          <div><strong>${r.title||r.id}</strong> (${r.severity||'INFO'})</div>
          <div>${r.summary||r.description||''}</div>
          <div>Component: ${r.component||'N/A'}</div>
          ${r.remedy?'<div>Remedy: '+r.remedy+'</div>':''}
        </div>
      `).join('');
    }

    document.getElementById('runSweep').addEventListener('click', runSweep);
    document.getElementById('refreshData').addEventListener('click', refreshData);
  </script>
</body>
</html>
