<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EV Service Intelligence</title>
<style>
body { font-family: Arial, sans-serif; margin:20px; }
header { display:flex; align-items:center; gap:1rem; margin-bottom:1rem; }
select, button { padding:0.5rem; font-size:1rem; }
button:disabled { opacity:0.6; cursor:not-allowed; }
.card-section { margin-top:2rem; }
.card { border:1px solid #ccc; padding:1rem; margin-bottom:1rem; border-radius:5px; }
.loading { display:flex; align-items:center; gap:0.5rem; color:#555; }
.spinner { width:16px; height:16px; border:2px solid #ccc; border-top-color:#333; border-radius:50%; animation: spin 1s linear infinite; }
@keyframes spin { from { transform: rotate(0deg);} to { transform: rotate(360deg);} }
.stats { display:flex; gap:1rem; margin-top:1rem; }
.stats div { font-weight:bold; }
</style>
</head>
<body>

<header>
  <label for="selModel">Vehicle:</label>
  <select id="selModel">
    <option>Chevrolet Equinox EV</option>
    <option>Chevrolet Blazer EV</option>
    <option>Ford Mustang Mach-E</option>
  </select>

  <label for="selYear">Year:</label>
  <select id="selYear">
    <option>2024</option>
    <option>2025</option>
    <option>2026</option>
  </select>

  <button id="sweepBtn">Run Sweep</button>
  <div id="sweepDot"></div>
  <span id="sweepStatus"></span>
</header>

<div class="stats">
  <div>Recalls: <span id="statRecall">0</span></div>
  <div>TSBs: <span id="statTsb">0</span></div>
  <div>PIPs: <span id="statPip">0</span></div>
  <div>Community: <span id="statCommunity">0</span></div>
</div>

<div id="lastSweepLabel" style="margin-top:0.5rem;color:#666;">Last sweep: —</div>

<div class="card-section" id="recallCards"></div>
<div class="card-section" id="tsbCards"></div>
<div class="card-section" id="pipCards"></div>
<div class="card-section" id="communityCards"></div>

<script type="module">
import { runSweep } from './run-sweep.js';

document.getElementById('sweepBtn').addEventListener('click', () => runSweep());

// Optional: trigger sweep on first load
// runSweep();
</script>

</body>
</html>
